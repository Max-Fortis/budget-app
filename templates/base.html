<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>{% block title %}Iceberg{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}

    <!-- Shared Bottom Nav — active state set by request.endpoint -->
    {% if request.endpoint in ['index', 'scan', 'budgets'] %}
    <header class="topbar">
      <div class="topbar__brand">
        <img src="{{ url_for('static', filename='icons/logo-iceberg.svg') }}" alt="" class="topbar__logo-icon">
        <span class="topbar__wordmark">ICEBERG</span>
      </div>
      <div class="topbar__status">
        <span class="topbar__dot"></span>
      </div>
    </header>
    {% endif %}

    {% if request.endpoint in ['index', 'scan', 'budgets'] %}
    <nav class="bottomnav">
      <a href="{{ url_for('index') }}" class="bottomnav__item {% if request.endpoint in ['index', 'scan'] %}bottomnav__item--active{% endif %}">
        <img src="{{ url_for('static', filename='icons/nav-add.svg') }}" alt="" class="bottomnav__icon">
        <span>Add Spending</span>
      </a>
      <a href="{{ url_for('budgets') }}" class="bottomnav__item {% if request.endpoint == 'budgets' %}bottomnav__item--active{% endif %}">
        <img src="{{ url_for('static', filename='icons/nav-budgets.svg') }}" alt="" class="bottomnav__icon">
        <span>Budgets</span>
      </a>
      <a href="#" class="bottomnav__item" onclick="document.getElementById('set-budget-section').style.display='block'; return false;">
        <img src="{{ url_for('static', filename='icons/nav-setup.svg') }}" alt="" class="bottomnav__icon">
        <span>Setup</span>
      </a>
    </nav>
    {% endif %}
</body>
</html>
